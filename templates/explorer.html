{% extends "base.html" %}
{% block content %}
<style>
    .business-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-top: 20px;
    }
    .biz-card {
        background: #111;
        border: 1px solid #222;
        border-radius: 12px;
        padding: 20px 10px;
        text-align: center;
        text-decoration: none;
        transition: 0.3s;
    }
    .biz-card:hover { border-color: #ff4b2b; background: #1a1a1a; }
    .biz-icon { font-size: 28px; display: block; margin-bottom: 8px; }
    .biz-name { color: #eee; font-size: 13px; font-weight: 600; }
    .special-add { background: #ff4b2b !important; border: none; }
</style>

<div class="explorer-header" style="text-align:center; margin-bottom:20px;">
    <h2 style="color:#ff4b2b;">BUSINESS HUB</h2>
    <p style="font-size:12px; color:#888;">Propulsez vos activités sur VYBE</p>
</div>

<div class="business-grid">
    <a href="{{ url_for('explorer_category', category='boutique') }}" class="biz-card">
        <span class="biz-icon">🛍️</span>
        <span class="biz-name">Boutique / Shop</span>
    </a>
    <a href="{{ url_for('explorer_category', category='divertissement') }}" class="biz-card">
        <span class="biz-icon">🎭</span>
        <span class="biz-name">Divertissement</span>
    </a>
    <a href="{{ url_for('explorer_category', category='news') }}" class="biz-card">
        <span class="biz-icon">📰</span>
        <span class="biz-name">New / Info</span>
    </a>
    <a href="{{ url_for('explorer_category', category='ecole') }}" class="biz-card">
        <span class="biz-icon">🎓</span>
        <span class="biz-name">École / Formation</span>
    </a>
    <a href="{{ url_for('explorer_category', category='emploi') }}" class="biz-card">
        <span class="biz-icon">💼</span>
        <span class="biz-name">Offre d'emploi</span>
    </a>
    <a href="{{ url_for('explorer_category', category='restaurant') }}" class="biz-card">
        <span class="biz-icon">🍴</span>
        <span class="biz-name">Restaurant</span>
    </a>
    <a href="#" class="biz-card special-add" style="grid-column: span 2;">
        <span class="biz-icon">➕</span>
        <span class="biz-name" style="color:white;">Créer ou Add+</span>
    </a>
</div>
{% endblock %}
