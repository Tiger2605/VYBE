<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{% block title %}VYBE{% endblock %}</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VYBE">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
    <meta name="theme-color" content="#ff4b2b">
    <style>
        /* Styles Globaux */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* Ajustement du padding selon la page */
        body { 
            {% if request.endpoint != 'dashboard' %}
            padding-bottom: 90px; 
            {% endif %}
        }

        /* Container intelligent */
        .container { 
            max-width: 500px; 
            margin: auto; 
            {% if request.endpoint != 'dashboard' %}
            padding: 15px; 
            {% endif %}
        }

        /* Branding Header - S'adapte au Dashboard */
        .brand-header {
            text-align: center;
            padding: 15px 0;
            z-index: 1100;
            position: relative;
        }

        /* Mode Overlay pour le Dashboard uniquement */
        .header-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            pointer-events: none; /* Laisse passer les clics vers la recherche */
        }

        .brand-name {
            color: #ff4b2b;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 3px;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .brand-subtitle {
            font-size: 9px;
            color: #ccc;
            letter-spacing: 1px;
            margin-top: -3px;
            display: block;
            text-transform: lowercase;
        }

        /* Flash Messages */
        .flash-messages { 
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            z-index: 2000; 
        }
        .flash-item {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            animation: fadeIn 0.4s ease;
        }
        .flash-success { background: #2ecc71; color: white; }
        .flash-error { background: #e74c3c; color: white; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Barre de Navigation Basse */
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(17, 17, 17, 0.95); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.08); 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            padding: 8px 0 12px 0; 
            z-index: 2000; 
            height: 70px;
        }

        .nav-item { 
            text-decoration: none; 
            color: #777; 
            text-align: center; 
            flex: 1; 
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-item.active { color: #ff4b2b; }
        .nav-icon { font-size: 22px; margin-bottom: 2px; }
        .nav-text { font-size: 10px; font-weight: 600; }

        /* Bouton Central + */
        .nav-upload-container {
            position: relative;
            top: -20px;
        }
        .nav-upload {
            background: linear-gradient(45deg, #ff4b2b, #ff6b4b);
            color: white !important;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(255, 75, 43, 0.5);
            border: 4px solid #000;
            transition: transform 0.2s;
        }
        .nav-upload:active { transform: scale(0.9); }
    </style>
</head>
<body class="{% if request.endpoint == 'dashboard' %}dashboard-page{% endif %}">

    <div class="brand-header {% if request.endpoint == 'dashboard' %}header-overlay{% endif %}">
        <h1 class="brand-name">VYBE</h1>
        <span class="brand-subtitle">vibe-africa edition</span>
    </div>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-messages">
              {% for category, message in messages %}
                <div class="flash-item flash-{{ category }}">
                    {{ message }}
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <nav class="bottom-nav">
        <a href="{{ url_for('dashboard') }}" class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">Accueil</span>
        </a>

        <a href="{{ url_for('messages_list') }}" class="nav-item {% if request.endpoint == 'messages_list' %}active{% endif %}">
            <span class="nav-icon">📩</span>
            <span class="nav-text">Messages</span>
        </a>

        <a href="{{ url_for('upload_video') }}" class="nav-item nav-upload-container">
            <div class="nav-upload">+</div>
        </a>

        <a href="{{ url_for('explorer') }}" class="nav-item {% if request.endpoint == 'explorer' %}active{% endif %}">
            <span class="nav-icon">🔍</span>
            <span class="nav-text">Explorer</span>
        </a>

        <a href="{% if session.get('username') %}{{ url_for('profile', username=session['username']) }}{% else %}{{ url_for('profile') }}{% endif %}" 
           class="nav-item {% if request.endpoint == 'profile' %}active{% endif %}">
            <span class="nav-icon">👤</span>
            <span class="nav-text">Profil</span>
        </a>
    </nav>

</body>
</html>
