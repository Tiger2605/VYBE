<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}VYBE{% endblock %}</title>
    <style>
        /* Styles Globaux */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #000; 
            color: white; 
            margin: 0; 
            padding-bottom: 90px; /* Espace pour la barre du bas */
        }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        
        /* Branding Header */
        .brand-header {
            text-align: center;
            padding: 20px 0;
        }
        .brand-name {
            color: #ff4b2b;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }
        .brand-subtitle {
            font-size: 10px;
            color: #888;
            letter-spacing: 1px;
            margin-top: -5px;
            display: block;
        }

        /* Style des Messages Flash */
        .flash-messages { margin-bottom: 20px; }
        .flash-item {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            animation: fadeIn 0.5s ease;
        }
        .flash-success { background: #2ecc71; color: white; }
        .flash-error { background: #e74c3c; color: white; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Barre de Navigation Basse */
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #111; 
            border-top: 1px solid #222; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            padding: 10px 0 15px 0; 
            z-index: 2000; 
        }

        .nav-item { 
            text-decoration: none; 
            color: #888; 
            text-align: center; 
            flex: 1; 
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-item.active { color: #ff4b2b; }

        .nav-icon { font-size: 22px; margin-bottom: 2px; }
        .nav-text { font-size: 10px; font-weight: 500; }

        .nav-upload {
            background: #ff4b2b;
            color: white !important;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            margin-top: -25px; 
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
            border: 4px solid #000;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-header">
            <h1 class="brand-name">VYBE</h1>
            <span class="brand-subtitle">vibe-africa edition</span>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-messages">
              {% for category, message in messages %}
                <div class="flash-item flash-{{ category }}">
                    {{ message }}
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <nav class="bottom-nav">
        <a href="{{ url_for('dashboard') }}" class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">Accueil</span>
        </a>

        <a href="{{ url_for('messages_list') }}" class="nav-item {% if request.endpoint == 'messages_list' %}active{% endif %}">
            <span class="nav-icon">📩</span>
            <span class="nav-text">Messages</span>
        </a>

        <a href="{{ url_for('upload_video') }}" class="nav-item">
            <div class="nav-upload">+</div>
        </a>

        <a href="{{ url_for('dashboard') }}" class="nav-item">
            <span class="nav-icon">🔍</span>
            <span class="nav-text">Explorer</span>
        </a>

        <a href="{% if session.get('username') %}{{ url_for('profile', username=session['username']) }}{% else %}{{ url_for('profile') }}{% endif %}" 
           class="nav-item {% if request.endpoint == 'profile' %}active{% endif %}">
            <span class="nav-icon">👤</span>
            <span class="nav-text">Profil</span>
        </a>
    </nav>

</body>
</html>
