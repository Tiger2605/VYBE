{% extends "base.html" %}

{% block title %}Modifier mon profil - VIBE AFRICA{% endblock %}

{% block content %}
<style>
    .edit-container {
        max-width: 500px;
        margin: 30px auto;
        background: #222;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; color: #888; margin-bottom: 8px; font-size: 14px; }
    .form-control {
        width: 100%;
        padding: 12px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 10px;
        color: white;
        outline: none;
    }
    .form-control:focus { border-color: #ff4b2b; }
    .btn-save {
        width: 100%;
        padding: 15px;
        background: #ff4b2b;
        color: white;
        border: none;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }
    .btn-save:hover { background: #ff3516; transform: scale(1.02); }
    .preview-img {
        width: 100px; height: 100px; border-radius: 50%;
        object-fit: cover; border: 2px solid #ff4b2b; margin-bottom: 10px;
    }
</style>

<div class="edit-container">
    <h2 style="text-align: center; margin-bottom: 25px;">Modifier le profil</h2>
    
    <form action="{{ url_for('edit_profile') }}" method="POST" enctype="multipart/form-data">
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="{{ url_for('static', filename='uploads/profiles/' + user.profile_pic) if user.profile_pic else '#' }}" class="preview-img" alt="Photo">
            <label for="profile_pic" style="color: #ff4b2b; cursor: pointer; display: block;">Changer la photo</label>
            <input type="file" id="profile_pic" name="profile_pic" style="display: none;" accept="image/*">
        </div>

        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control" value="{{ user.username }}" required>
        </div>

        <div class="form-group">
            <label>Ma Bio</label>
            <textarea name="bio" class="form-control" rows="3">{{ user.bio }}</textarea>
        </div>

        <div class="form-group">
            <label>Numéro de téléphone</label>
            <input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}" placeholder="+243...">
        </div>

        <button type="submit" class="btn-save">Enregistrer les modifications</button>
    </form>
    
    <p style="text-align: center; margin-top: 15px;">
        <a href="{{ url_for('profile', username=user.username) }}" style="color: #666; text-decoration: none; font-size: 13px;">Annuler</a>
    </p>
</div>
{% endblock %}
