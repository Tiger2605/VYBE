{% extends "base.html" %}
{% block content %}
<div style="max-width: 600px; margin: 20px auto; text-align: center; background: #111; padding: 20px; border-radius: 15px;">
    <h3 style="color: white; margin-bottom: 15px;">{{ vibe.title }}</h3>
    
    {% if vibe.category == 'Photos' %}
        <img src="{{ vibe.filename if vibe.filename.startswith('http') else url_for('static', filename='uploads/' + vibe.filename) }}" style="width: 100%; border-radius: 10px;">
    {% else %}
        <video controls autoplay style="width: 100%; border-radius: 10px;">
            <source src="{{ vibe.filename if vibe.filename.startswith('http') else url_for('static', filename='uploads/' + vibe.filename) }}" type="video/mp4">
        </video>
    {% endif %}
    
    <div style="margin-top: 20px;">
        <p style="color: #888;">Publié par <strong>@{{ vibe.author.username }}</strong></p>
        <a href="{{ url_for('profile', username=vibe.author.username) }}" style="color: #ff4b2b; text-decoration: none;">Voir le profil</a>
    </div>
</div>
{% endblock %}
