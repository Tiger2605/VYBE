{% extends "base.html" %}
{% block content %}
<div style="margin-bottom: 20px;">
    <a href="{{ url_for('explorer') }}" style="color: #ff4b2b; text-decoration: none;">← Retour</a>
    <h3 style="text-transform: uppercase; margin-top: 15px;">{{ category }}</h3>
</div>

<div class="sub-grid" style="display: grid; gap: 10px;">
    {% for item in items %}
    <a href="{{ item.link }}" style="background:#111; padding:15px; border-radius:10px; text-decoration:none; display:flex; align-items:center; border:1px solid #222;">
        <span style="font-size:24px; margin-right:15px;">{{ item.icon }}</span>
        <span style="color:white; font-weight:bold;">{{ item.name }}</span>
        <span style="margin-left:auto; color:#444;">❯</span>
    </a>
    {% else %}
    <p style="color:#666; text-align:center;">Bientôt disponible...</p>
    {% endfor %}
</div>
{% endblock %}
