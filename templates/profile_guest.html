{% extends "base.html" %}

{% block content %}
<style>
    .guest-container {
        text-align: center;
        padding: 50px 20px;
        color: white;
        background: #111;
        min-height: 80vh;
    }
    .auth-methods {
        display: flex;
        flex-direction: column;
        gap: 15px;
        max-width: 300px;
        margin: 30px auto;
    }
    .btn-auth {
        padding: 12px;
        border-radius: 25px;
        text-decoration: none;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: 0.3s;
    }
    .google { background: white; color: black; }
    .phone { background: #2ecc71; color: white; }
    .vibe { background: #ff4b2b; color: white; }
</style>

<div class="guest-container">
    <div style="font-size: 60px;">👤</div>
    <h2>Rejoignez VIBE AFRICA</h2>
    <p style="color: #888;">Connectez-vous pour voir votre profil, partager des vibes et discuter avec vos amis.</p>

    <div class="auth-methods">
        <a href="#" class="btn-auth google">
            <img src="https://www.google.com/favicon.ico" width="18"> Continuer avec Google
        </a>
        <a href="{{ url_for('login') }}" class="btn-auth phone">
            📞 Numéro de téléphone
        </a>
        <a href="{{ url_for('register') }}" class="btn-auth vibe">
            ✨ Créer un compte Vibe
        </a>
    </div>

    <p style="margin-top: 20px; font-size: 14px;">
        Déjà un compte ? <a href="{{ url_for('login') }}" style="color: #ff4b2b;">Se connecter</a>
    </p>
</div>
{% endblock %}
