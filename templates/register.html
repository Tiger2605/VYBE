{% extends "base.html" %}

{% block title %}Inscription - VIBE AFRICA{% endblock %}

{% block content %}
<style>
    .register-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
    }
    .form-container { 
        background: #222; 
        padding: 30px; 
        border-radius: 15px; 
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); 
        width: 100%;
        max-width: 350px; 
        border: 1px solid #333;
        text-align: center;
    }
    h2 { color: #ff4b2b; margin-top: 0; }
    input, textarea { 
        width: 100%; 
        padding: 12px; 
        margin: 10px 0; 
        border: 1px solid #444; 
        border-radius: 8px; 
        box-sizing: border-box; 
        background: #111;
        color: white;
        font-family: sans-serif;
    }
    textarea { height: 80px; resize: none; }
    
    .btn-register { 
        width: 100%; 
        padding: 12px; 
        background: #ff4b2b; 
        border: none; 
        color: white; 
        border-radius: 8px; 
        cursor: pointer; 
        font-weight: bold; 
        font-size: 16px;
        margin-top: 10px;
    }
    .login-link {
        margin-top: 15px;
        font-size: 14px;
        color: #888;
    }
    .login-link a {
        color: #ff4b2b;
        text-decoration: none;
    }
</style>

<div class="register-wrapper">
    <div class="form-container">
        <h2>Rejoins VIBE AFRICA</h2>
        <p style="color: #888; font-size: 13px; margin-bottom: 20px;">Crée ton profil et commence à partager.</p>
        
        <form method="POST">
            <input type="text" name="username" placeholder="Nom d'utilisateur" required>
            
            <input type="email" name="email" placeholder="Adresse Email" required>
            <input type="tel" name="phone" placeholder="Numéro de téléphone (ex: +243...)" required>
            
            <input type="password" name="password" placeholder="Mot de passe" required>
            <textarea name="bio" placeholder="Parle-nous de toi (ex: Vendeur de smartphones à Gombe)"></textarea>
            
            <button type="submit" class="btn-register">S'inscrire</button>
        </form>
        
        <div class="login-link">
            Déjà un compte ? <a href="{{ url_for('login') }}">Se connecter</a>
        </div>
    </div>
</div>
{% endblock %}
