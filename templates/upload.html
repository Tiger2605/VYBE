{% extends "base.html" %}

{% block title %}Publier une Vibe - VIBE AFRICA{% endblock %}

{% block content %}
<style>
    .upload-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
    }
    .upload-container { 
        background: #222; 
        padding: 30px; 
        border-radius: 15px; 
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); 
        width: 100%;
        max-width: 400px; 
        border: 1px solid #333;
        text-align: center;
    }
    h1 { color: #ff4b2b; font-size: 22px; margin-bottom: 20px; }
    
    .input-field { 
        width: 100%; 
        padding: 12px; 
        margin: 10px 0; 
        border: 1px solid #444; 
        border-radius: 8px; 
        box-sizing: border-box; 
        background: #111;
        color: white;
        font-family: inherit;
    }

    /* Style pour le menu de sélection */
    select.input-field {
        cursor: pointer;
        color: #bbb;
    }

    .file-input-wrapper {
        border: 2px dashed #444;
        padding: 20px;
        border-radius: 10px;
        background: #1a1a1a;
        margin: 15px 0;
        cursor: pointer;
        transition: 0.3s;
    }
    .file-input-wrapper:hover {
        border-color: #ff4b2b;
        background: #222;
    }

    .btn-upload { 
        width: 100%; 
        padding: 15px; 
        background: #ff4b2b; 
        border: none; 
        color: white; 
        border-radius: 8px; 
        cursor: pointer; 
        font-weight: bold; 
        font-size: 16px;
        margin-top: 10px;
    }
    .cancel-link {
        display: block;
        margin-top: 20px;
        color: #888;
        text-decoration: none;
        font-size: 14px;
    }
</style>

<div class="upload-wrapper">
    <div class="upload-container">
        <h1>Publier sur VIBE AFRICA 🌍</h1>
        
        <form method="POST" enctype="multipart/form-data">
            <input type="text" name="title" class="input-field" placeholder="Légende (ex: Ma nouvelle photo !)" required>
            
            <select name="category" class="input-field" required>
                <option value="" disabled selected>Choisir une catégorie...</option>
                <option value="Infos">📰 Infos / Actualités</option>
                <option value="Hot">🔥 Hot (Compte de feu)</option>
                <option value="Photos">📸 Photos</option>
                <option value="Tech">💻 Technologie</option>
                <option value="Vêtements">👕 Mode</option>
                <option value="Education">📚 École / Éducation</option>
            </select>

            <div class="file-input-wrapper" onclick="document.getElementById('file-field').click();">
                <p id="upload-icon" style="margin: 0; color: #3498db; font-weight: bold;">📁 Cliquer pour choisir un média</p>
                <p id="file-name-display" style="font-size: 11px; color: #888; margin-top: 5px;">Vidéo MP4 ou Image JPG/PNG</p>
                
                <input type="file" id="file-field" name="file" accept="video/*,image/*" required style="display: none;" onchange="showFileName(this)">
            </div>
            
            <button type="submit" class="btn-upload">Mettre en ligne</button>
        </form>
        
        <a href="{{ url_for('dashboard') }}" class="cancel-link">Annuler et revenir</a>
    </div>
</div>

<script>
    function showFileName(input) {
        if (input.files && input.files[0]) {
            var fileName = input.files[0].name;
            var display = document.getElementById('file-name-display');
            var icon = document.getElementById('upload-icon');
            
            display.innerText = "Fichier prêt : " + fileName;
            display.style.color = "#2ecc71";
            icon.innerText = "✅ Fichier sélectionné";
            icon.style.color = "#2ecc71";
        }
    }
</script>
{% endblock %}
