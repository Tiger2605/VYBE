{% extends "base.html" %}

{% block title %}Studio de Création - VYBE{% endblock %}

{% block content %}
<style>
    :root {
        --primary-color: #ff4b2b;
        --secondary-color: #3498db;
        --glass-bg: rgba(34, 34, 34, 0.9);
        --border-color: rgba(255, 255, 255, 0.1);
    }

    .upload-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 90vh;
        padding: 20px;
        background: linear-gradient(135deg, #111 0%, #000 100%);
    }

    .studio-card {
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        width: 100%;
        max-width: 900px; /* Légèrement plus large pour les nouveaux champs */
        border: 1px solid var(--border-color);
        display: grid;
        grid-template-columns: 1.2fr 1.8fr;
        gap: 30px;
    }

    @media (max-width: 850px) {
        .studio-card { grid-template-columns: 1fr; }
    }

    .studio-header {
        grid-column: 1 / -1;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 15px;
        margin-bottom: 10px;
    }

    .studio-header h1 {
        font-size: 24px;
        background: linear-gradient(to right, #ff4b2b, #ff416c);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
    }

    /* Zone de Prévisualisation */
    .preview-zone {
        background: #111;
        border-radius: 16px;
        border: 2px dashed #333;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
        min-height: 400px;
        transition: 0.3s;
        cursor: pointer;
    }

    .preview-zone.dragover {
        border-color: var(--primary-color);
        background: rgba(255, 75, 43, 0.05);
    }

    #preview-container img, #preview-container video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 12px;
    }

    /* Formulaire */
    .form-zone { display: flex; flex-direction: column; gap: 18px; }

    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { color: #888; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

    .input-field {
        background: #1a1a1a;
        border: 1px solid #333;
        padding: 12px 15px;
        border-radius: 10px;
        color: white;
        font-size: 14px;
        transition: 0.3s;
    }

    .input-field:focus {
        border-color: var(--primary-color);
        outline: none;
        box-shadow: 0 0 0 2px rgba(255, 75, 43, 0.1);
    }

    textarea.input-field {
        resize: none;
        min-height: 100px;
        line-height: 1.5;
    }

    .tag-input-wrapper {
        display: flex;
        align-items: center;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 10px;
        padding-left: 10px;
    }
    .tag-prefix { color: var(--primary-color); font-weight: bold; }
    .tag-input-wrapper .input-field { border: none; width: 100%; }

    .btn-publish {
        background: linear-gradient(to right, #ff4b2b, #ff416c);
        color: white;
        border: none;
        padding: 16px;
        border-radius: 12px;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        margin-top: 5px;
        transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn-publish:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(255, 75, 43, 0.3); }

    /* Barre de progression */
    .progress-container { display: none; margin-top: 10px; }
    .progress-bar { height: 4px; background: #333; border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary-color); width: 0%; transition: 0.4s; }
</style>

<div class="upload-wrapper">
    <div class="studio-card">
        <div class="studio-header">
            <h1>STUDIO VYBE 🌍</h1>
            <p style="color: #666; font-size: 13px; margin: 5px 0 0 0;">Créez du contenu qui inspire l'Afrique</p>
        </div>

        <div class="preview-zone" id="drop-zone" onclick="document.getElementById('file-field').click();">
            <div id="preview-placeholder">
                <div style="font-size: 45px; margin-bottom: 15px;">🚀</div>
                <p style="color: #eee; margin: 0; font-weight: 600;">Sélectionnez un média</p>
                <p style="color: #666; font-size: 12px;">Glisser-déposer ou cliquer</p>
            </div>
            <div id="preview-container" style="display: none; width: 100%; height: 100%;"></div>
        </div>

        <form class="form-zone" id="upload-form" method="POST" enctype="multipart/form-data">
            <div class="input-group">
                <label>Titre / Légende courte</label>
                <input type="text" name="title" class="input-field" placeholder="Un titre accrocheur..." required>
            </div>

            <div class="input-group">
                <label>Description détaillée</label>
                <textarea name="description" class="input-field" placeholder="Racontez-nous en plus sur cette Vibe..."></textarea>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label>Catégorie</label>
                    <select name="category" class="input-field" required>
                        <option value="" disabled selected>Choisir...</option>
                        <option value="Infos">📰 Infos</option>
                        <option value="Hot">🔥 Hot</option>
                        <option value="Photos">📸 Photos</option>
                        <option value="Tech">💻 Technologie</option>
                        <option value="Education">📚 Éducation</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Tags</label>
                    <div class="tag-input-wrapper">
                        <span class="tag-prefix">#</span>
                        <input type="text" name="tags" class="input-field" placeholder="afrique, vibe, buzz">
                    </div>
                </div>
            </div>

            <input type="file" id="file-field" name="file" accept="video/*,image/*" required style="display: none;" onchange="handleFiles(this.files)">

            <div class="progress-container" id="prog-container">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <p style="font-size: 11px; color: #ff4b2b; margin: 0;" id="prog-text">Préparation de l'envoi...</p>
                    <span id="prog-perc" style="font-size: 11px; color: #888;">0%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
            </div>

            <button type="submit" class="btn-publish" id="submit-btn">Publier maintenant</button>
            <a href="{{ url_for('dashboard') }}" style="text-align: center; color: #555; font-size: 13px; text-decoration: none;">Annuler</a>
        </form>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-field');
    const previewContainer = document.getElementById('preview-container');
    const previewPlaceholder = document.getElementById('preview-placeholder');

    // Drag & Drop
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); }));
    ['dragenter', 'dragover'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.add('dragover')));
    ['dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.remove('dragover')));

    dropZone.addEventListener('drop', (e) => {
        fileInput.files = e.dataTransfer.files;
        handleFiles(e.dataTransfer.files);
    });

    function handleFiles(files) {
        if (files.length > 0) {
            const file = files[0];
            previewPlaceholder.style.display = 'none';
            previewContainer.style.display = 'block';
            previewContainer.innerHTML = '';
            const reader = new FileReader();
            reader.onload = (e) => {
                const el = file.type.startsWith('image/') ? document.createElement('img') : document.createElement('video');
                if (file.type.startsWith('video/')) el.controls = true;
                el.src = e.target.result;
                previewContainer.appendChild(el);
            };
            reader.readAsDataURL(file);
        }
    }

    document.getElementById('upload-form').onsubmit = function() {
        document.getElementById('prog-container').style.display = 'block';
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.style.opacity = "0.7";
        btn.innerText = "Téléchargement...";
        
        let w = 0;
        const interval = setInterval(() => {
            if (w >= 98) clearInterval(interval);
            else {
                w += Math.floor(Math.random() * 3) + 1;
                if(w > 98) w = 98;
                document.getElementById('prog-fill').style.width = w + '%';
                document.getElementById('prog-perc').innerText = w + '%';
                if(w > 80) document.getElementById('prog-text').innerText = "Finalisation sur Cloudinary...";
                else document.getElementById('prog-text').innerText = "Envoi du média...";
            }
        }, 150);
    };
</script>
{% endblock %}
